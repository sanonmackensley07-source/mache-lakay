<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Mache Lakay</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <script src="js/navbar.js"></script>
</head>
<body style="background: #f4f6f9; font-family: Arial, sans-serif;">

<nav class="navbar" style="background: #131921; color: #ff9900; padding: 15px; text-align: center;">
    <h1 style="margin: 0; font-size: 24px;">👑 Panel Admin Mache Lakay</h1>
</nav>

<section class="dashboard" style="max-width: 1100px; margin: 30px auto; padding: 0 15px;">
    <h2>Kontwòl Sistèm (Estatistik Global)</h2>

    <!-- 📊 1. GWO GRID ESTATISTIK AN TAN REYÈL LA -->
    <div class="grid" style="display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 40px;">
        <div class="card" style="flex: 1; min-width: 200px; background: #131921; color: white; padding: 20px; border-radius: 8px; text-align: center; border-bottom: 4px solid #ff9900;">
            <h3 style="color: #ff9900; margin: 0 0 10px 0;">👥 Users</h3>
            <p id="stat-users" style="font-size: 26px; font-weight: bold; margin: 0;">0</p>
        </div>
        <div class="card" style="flex: 1; min-width: 200px; background: #131921; color: white; padding: 20px; border-radius: 8px; text-align: center; border-bottom: 4px solid #ff9900;">
            <h3 style="color: #ff9900; margin: 0 0 10px 0;">🏪 Boutik Total</h3>
            <p id="stat-sellers" style="font-size: 26px; font-weight: bold; margin: 0;">0</p>
        </div>
        <div class="card" style="flex: 1; min-width: 200px; background: #131921; color: white; padding: 20px; border-radius: 8px; text-align: center; border-bottom: 4px solid #ff9900;">
            <h3 style="color: #ff9900; margin: 0 0 10px 0;">📦 Boutik Aktif</h3>
            <p id="stat-active" style="font-size: 26px; font-weight: bold; margin: 0;">0</p>
        </div>
        <div class="card" style="flex: 1; min-width: 200px; background: #131921; color: white; padding: 20px; border-radius: 8px; text-align: center; border-bottom: 4px solid #ff9900;">
            <h3 style="color: #ff9900; margin: 0 0 10px 0;">🛒 Orders</h3>
            <p id="stat-orders" style="font-size: 26px; font-weight: bold; margin: 0;">0</p>
        </div>
        <div class="card" style="flex: 1; min-width: 200px; background: #131921; color: white; padding: 20px; border-radius: 8px; text-align: center; border-bottom: 4px solid #ff9900;">
            <h3 style="color: #ff9900; margin: 0 0 10px 0;">💰 Chif d'Afè</h3>
            <p id="stat-revenue" style="font-size: 26px; font-weight: bold; margin: 0;">$0.00</p>
        </div>
    </div>

    <!-- 🏪 2. TABLO POU VERIFYE AK APWOUVE VANDÈ YO -->
    <h2 style="margin-bottom: 15px;">🏪 Vandè k ap tann Aktivasyon (Pending 2,500 HTG)</h2>
    <table style="width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
        <thead>
            <tr style="background: #131921; color: #ff9900;">
                <th style="padding: 12px; text-align: left;">Boutik / Pwopriyetè</th>
                <th style="padding: 12px; text-align: left;">NIF / CIN</th>
                <th style="padding: 12px; text-align: left;">Telefòn / Rezo</th>
                <th style="padding: 12px; text-align: left;">Kont Payout</th>
                <th style="padding: 12px; text-align: left;">Aksyon</th>
            </tr>
        </thead>
        <tbody id="pending-sellers-list">
            <tr><td colspan="5" style="text-align:center; padding:20px; color:#777;">N ap chaje lis vandè yo... ⏳</td></tr>
        </tbody>
    </table>
</section>

<!-- ⚙️ SCRIPTS KONEKSYON API AN LIY SOU VERCEL -->
<script src="js/admin.js"></script>
<script src="js/api.js"></script>
<script src="js/products.js"></script>

<script>
    // 🚀 SÈL KÒRÈK LYEN API VERCEL PA W LA
    const API = "https://vercel.app";

    async function loadAdminDashboard() {
        try {
            // 1. Chaje Statistik Jenere depi nan MongoDB
            const resStats = await fetch(`${API}/admin/global-stats`);
            if (!resStats.ok) throw new Error("Pa ka chaje stats");
            const stats = await resStats.json();
            
            document.getElementById("stat-users").innerText = stats.totalUsers || 0;
            document.getElementById("stat-sellers").innerText = stats.totalSellers || 0;
            document.getElementById("stat-active").innerText = stats.totalActiveSellers || 0;
            document.getElementById("stat-orders").innerText = stats.totalOrders || 0;
            document.getElementById("stat-revenue").innerText = `$${(stats.totalRevenue || 0).toFixed(2)}`;

            // 2. Chaje lis Vandè k ap tann yo
            const resSellers = await fetch(`${API}/admin/pending-sellers`);
            const sellers = await resSellers.json();
            const listContainer = document.getElementById("pending-sellers-list");

            if (sellers.length === 0) {
                listContainer.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:20px; font-weight:bold; color:#666;">Pa gen okenn demand aktivasyon pou kounye a. 😎</td></tr>`;
                return;
            }

            listContainer.innerHTML = sellers.map(s => `
                <tr style="border-bottom: 1px solid #eee;">
                    <td style="padding: 12px;"><b>${s.sellerProfile?.shopName || 'Boutik vid'}</b><br><span style="color:#666;">👤 ${s.name}</span></td>
                    <td style="padding: 12px;">NIF: ${s.sellerProfile?.nif || 'Manke'}<br>CIN: ${s.sellerProfile?.cin || 'Manke'}</td>
                    <td style="padding: 12px;">📞 ${s.sellerProfile?.shopPhone || 'Manke'}<br><span style="text-transform:uppercase; color:#ff5500; font-weight:bold;">${s.paymentMethodChosen || 'moncash'}</span></td>
                    <td style="padding: 12px;">Rezo: <b>${s.sellerProfile?.payoutMethod || 'Manke'}</b><br>Kont: <span>${s.sellerProfile?.payoutDetails || 'Manke'}</span></td>
                    <td style="padding: 12px;"><button style="background: #4caf50; color: white; padding: 6px 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;" onclick="approveVendor('${s._id}', '${s.sellerProfile?.shopName}')">✔ Aktive</button></td>
                </tr>
            `).join("");

        } catch (err) {
            console.error("Erè admin vizyèl:", err);
        }
    }

    // Fonksyon pou apwouve ak aktive kont lan nan MongoDB
    async function approveVendor(userId, shopName) {
        if (!confirm(`Èske ou verifye peman 2,500 HTG a tout bon epi w vle aktive boutik "${shopName}" la?`)) return;

        try {
            const response = await fetch(`${API}/admin/approve-seller`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ userId })
            });

            if (!response.ok) throw new Error("Sèvè a pa ka apwouve vandè sa a.");
            
            alert(`🎉 Siksè! Boutik "${shopName}" aktive nèt. Koulye a vandè a ka vann.`);
            loadAdminDashboard(); // Rafrechi paj la otomatikman

        } catch (error) {
            alert("❌ Erè: " + error.message);
        }
    }

    document.addEventListener("DOMContentLoaded", loadAdminDashboard);
</script>

</body>
</html>
